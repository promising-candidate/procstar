name: IssueOps

on:
  issue_comment:
    types: created

jobs:
  IssueOps:
    if: github.event.comment.body == 'Approved' && github.actor == 'promising-candidate'
    runs-on: ubuntu-latest
    steps:
    - name: Echo Step
      run: |
        echo ${{ github.event.comment.body }}
        echo ${{ github.actor }}
        lab_name=$(grep -oP '(?<=Lab Available for testing ).*' ${{ github.event.issue.title }})
        echo $lab_name
        
