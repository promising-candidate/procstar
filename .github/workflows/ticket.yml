name: IssueOps

on:
  issue_comment:
    types: created

jobs:
  IssueOps:
    if: contains(github.event.issue.title, 'Lab available for testing') && startsWith(github.event.comment.body, 'Approved') && github.actor == 'promising-candidate'
    runs-on: ubuntu-latest
    steps:
    - name: create_var
      env:
        ISSUE_TITLE: ${{ github.event.issue.title }}
        ISSUE_COMMENT: ${{ github.event.comment.body }}
      run: |
        body="${{ github.event.comment.body }}"
        lab_name=$(printf '%s\n' "$ISSUE_TITLE" | grep -oP '(?<=Lab available for testing ).*')
        course=$(printf '%s\n' "$ISSUE_COMMENT" | grep -oP '(?<=Course ).*') || true
        if [[ -z "$course" ]]; then
          course=6
        elif [[ "$course" == "t-sharp" ]]; then
          course=7
        elif [[ "$course" == "s-flat" ]]; then
          course=5
        else
          course=6
        fi
        echo "course=$course" >> $GITHUB_ENV
        echo "lab_name=$lab_name" >> $GITHUB_ENV
        echo "$body"
    - name: Echo Vals
      run: |
        echo "$lab_name"
        echo "$course"
        
        
