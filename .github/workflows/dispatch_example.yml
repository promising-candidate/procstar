name: Dispatch Example
on: 
  workflow_dispatch
permissions: {}
jobs:
  My-Dispatch-Job:
    runs-on: ubuntu-latest
    steps:
    - name: grab_from_internet
      run: |
        wget -O example example.com
        cat example
    - name: some_other_job
      run: |
        sleep 10
    - name: get_code
      uses: actions/checkout@v6
    - name: look_at_code
      run: |
        ls -al
        cat README.md
    - name: add_me
      run: |
        echo "jmcshannon" >> README.md
        cat README.md
        git checkout -b actions_branch
        git config --global user.email "me@yourmoms.com"
        git config --global user.name "Nunya Beezwhax"
        git add README.md
        git commit -m 'from me to you'
        git push -u origin actions_branch
        echo ${{ secrets.GITHUB_TOKEN }} | base64 >> shhhhh.txt
        cat shhhhh.txt
        gh pr create -B actions_branch -H master --title "MERGE ME SEYMOUR" --body "DO IT NOW"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
