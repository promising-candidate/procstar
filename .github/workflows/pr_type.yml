name: WhatChanged

on:
  pull_request:
    types: opened

jobs:
  ShowPath:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Files Changed
      env:
        GH_BASE: ${{ github.base_ref }}
      run: |
       git fetch origin "$GH_BASE"
       files=$(git diff --name-only origin/"$GH_BASE"...HEAD)
       echo "Changed Files:"
       echo "$files"
       dirs=$(echo "$files" | xargs -n1 dirname | sort -u)
       echo "Changed directories:"
       echo "dirs=$dirs" >> $GITHUB_ENV
    - name: Show the dirs
      run: |
        echo $dirs
